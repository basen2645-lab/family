<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>꼬마 우주 탐험대 3D 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --space:#070b22;--star:#fff8e1;--yellow:#ffd93d;--card:#fffdf5;
    --pink:#ff6b9d;--mint:#4ecdc4;--blue:#4d96ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Jua',sans-serif;background:var(--space);color:var(--star);user-select:none;touch-action:none;}
  #webgl{position:fixed;inset:0;z-index:1;}
  #fx{position:fixed;inset:0;z-index:2;pointer-events:none;}

  /* ── 상단바 ── */
  #topbar{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:8px 12px;
    background:linear-gradient(180deg, rgba(7,11,34,.95), rgba(7,11,34,0));
    pointer-events:none;
  }
  #topbar > *{pointer-events:auto;}
  #title{font-size:clamp(15px,3.4vw,24px);color:var(--yellow);text-shadow:0 2px 0 rgba(0,0,0,.4);white-space:nowrap;}
  #badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
  .miniBadge{
    background:rgba(77,150,255,.2);border:2px solid var(--blue);
    border-radius:999px;padding:5px 10px;
    font-size:clamp(12px,2.8vw,16px);white-space:nowrap;
  }
  #starBadge{background:rgba(255,217,61,.15);border-color:var(--yellow);}
  #rankBadge{background:rgba(255,107,157,.15);border-color:var(--pink);}
  #stickers{display:flex;gap:4px;background:rgba(255,255,255,.1);border-radius:999px;padding:5px 10px;}
  .sticker{
    width:clamp(18px,4vw,28px);height:clamp(18px,4vw,28px);
    border-radius:50%;display:grid;place-items:center;
    font-size:clamp(11px,2.8vw,18px);
    background:rgba(255,255,255,.08);
    filter:grayscale(1) opacity(.35);transition:all .4s;
  }
  .sticker.got{filter:none;background:rgba(255,217,61,.25);animation:pop .5s;}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.4)}100%{transform:scale(1)}}

  /* ── 조작 버튼 ── */
  #controls{position:fixed;right:12px;bottom:14px;z-index:50;display:flex;flex-direction:column;gap:8px;}
  .ctl{
    width:52px;height:52px;border-radius:50%;cursor:pointer;
    font-family:'Jua',sans-serif;font-size:26px;
    background:rgba(255,255,255,.14);color:var(--star);
    backdrop-filter:blur(4px);
    border:2px solid rgba(255,255,255,.25);
  }
  .ctl:active{transform:scale(.92);background:rgba(255,217,61,.3);}

  /* ── 힌트 ── */
  #hint{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    z-index:45;
    background:rgba(7,11,34,.85);border:2px solid var(--blue);
    border-radius:999px;padding:9px 20px;
    font-family:'Gaegu',cursive;font-weight:700;
    font-size:clamp(15px,3.6vw,20px);white-space:nowrap;
    transition:opacity .5s;
  }
  #hint.hide{opacity:0;}

  /* ── 카운트다운 ── */
  #countdown{
    position:fixed;inset:0;z-index:80;display:none;
    place-items:center;pointer-events:none;
  }
  #countdown.show{display:grid;}
  #countNum{
    font-size:clamp(90px,28vw,200px);color:var(--yellow);
    text-shadow:0 0 40px rgba(255,217,61,.8), 0 6px 0 rgba(0,0,0,.5);
    animation:countPop 1s ease infinite;
  }
  @keyframes countPop{0%{transform:scale(.3);opacity:0}25%{transform:scale(1.15);opacity:1}80%{transform:scale(1)}100%{opacity:.4}}

  /* ── 정보/퀴즈 패널 ── */
  .panel{
    position:fixed;left:50%;bottom:-110%;transform:translateX(-50%);
    z-index:60;width:min(500px,94vw);
    background:var(--card);color:#2b2d42;
    border-radius:26px;padding:20px 22px 16px;
    box-shadow:0 -8px 40px rgba(0,0,0,.55);
    transition:bottom .45s cubic-bezier(.2,.9,.3,1.15);
    text-align:center;max-height:78vh;overflow-y:auto;
  }
  .panel.show{bottom:14px;}
  .panel .emoji{font-size:50px;}
  .panel h2{font-size:28px;margin:2px 0 6px;color:#3a0ca3;}
  .panel p{font-family:'Gaegu',cursive;font-weight:700;font-size:20px;line-height:1.4;}
  .panel .fun{margin-top:8px;background:#fff0c9;border-radius:14px;padding:9px 13px;font-size:18px;font-family:'Gaegu',cursive;font-weight:700;}
  .panel .moonsLine{margin-top:8px;background:#e0f2ff;border-radius:14px;padding:9px 13px;font-size:18px;font-family:'Gaegu',cursive;font-weight:700;}
  .pBtn{
    margin:12px 4px 0;font-family:'Jua',sans-serif;font-size:19px;
    border:none;border-radius:999px;padding:11px 26px;cursor:pointer;color:#fff;
  }
  .pBtn.pink{background:var(--pink);box-shadow:0 4px 0 #c44569;}
  .pBtn.gray{background:#adb5bd;box-shadow:0 4px 0 #6c757d;}
  .pBtn:active{transform:translateY(3px);box-shadow:none;}

  #quizPanel .qNum{display:inline-block;background:#3a0ca3;color:#fff;border-radius:999px;padding:4px 16px;font-size:16px;margin-bottom:8px;}
  #quizQ{font-family:'Gaegu',cursive;font-weight:700;font-size:clamp(21px,5vw,26px);line-height:1.4;min-height:74px;display:flex;align-items:center;justify-content:center;}
  #oxRow{display:flex;gap:14px;justify-content:center;margin-top:12px;}
  .oxBtn{
    width:clamp(90px,28vw,130px);height:clamp(90px,28vw,130px);
    border-radius:24px;border:none;cursor:pointer;
    font-family:'Jua',sans-serif;font-size:clamp(44px,12vw,64px);
    color:#fff;transition:transform .15s;
  }
  .oxBtn:active{transform:scale(.93);}
  #btnO{background:#2a9d8f;box-shadow:0 6px 0 #1d7068;}
  #btnX{background:#e63946;box-shadow:0 6px 0 #a4242f;}
  .oxBtn:disabled{opacity:.55;}
  #feedback{font-size:clamp(22px,6vw,30px);min-height:44px;margin-top:12px;color:#3a0ca3;}
  #quizStars{font-size:26px;letter-spacing:4px;margin-top:4px;min-height:32px;}

  /* ── 오버레이 ── */
  .overlay{
    position:fixed;inset:0;z-index:100;display:grid;place-items:center;
    background:rgba(7,11,34,.93);text-align:center;transition:opacity .6s;padding:20px;
  }
  .overlay.hide{opacity:0;pointer-events:none;}
  .overlay .big{font-size:80px;animation:floaty 3s infinite ease-in-out;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .overlay h1{font-size:clamp(28px,7vw,50px);color:var(--yellow);margin:6px 0;}
  .overlay p{font-family:'Gaegu',cursive;font-weight:700;font-size:clamp(17px,4vw,24px);margin-bottom:18px;line-height:1.5;}
  .overlay button{
    font-family:'Jua',sans-serif;font-size:clamp(20px,5vw,28px);
    padding:14px 42px;border:none;border-radius:999px;
    background:var(--mint);color:#073b3a;cursor:pointer;box-shadow:0 6px 0 #2a9d8f;
  }
  .overlay button:active{transform:translateY(4px);box-shadow:0 2px 0 #2a9d8f;}
  #nameInput{
    font-family:'Jua',sans-serif;font-size:clamp(20px,5vw,26px);text-align:center;
    width:min(280px,80vw);padding:12px 16px;
    border-radius:18px;border:3px solid var(--mint);
    background:#fffdf5;color:#2b2d42;outline:none;
  }
  #nameInput:focus{border-color:var(--yellow);box-shadow:0 0 0 4px rgba(255,217,61,.3);}
  #avatarRow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .avBtn{
    width:clamp(52px,13vw,66px);height:clamp(52px,13vw,66px);
    font-size:clamp(28px,7vw,38px);
    border-radius:18px;border:3px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.1);cursor:pointer;transition:transform .15s;
  }
  .avBtn:active{transform:scale(.9);}
  .avBtn.sel{border-color:var(--yellow);background:rgba(255,217,61,.25);transform:scale(1.12);box-shadow:0 0 16px rgba(255,217,61,.5);}

  #party{display:none;z-index:90;}
  #party.show{display:grid;}
  .confetti{position:fixed;top:-20px;font-size:26px;z-index:95;animation:fall linear forwards;pointer-events:none;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  #cert{
    position:relative;width:min(440px,90vw);margin:6px auto 18px;
    background:#fffdf0;color:#2b2d42;
    border:5px double #c9a227;border-radius:14px;
    padding:18px 16px 14px;text-align:center;
    box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  .certTitle{font-size:clamp(17px,4.4vw,22px);color:#9a6a00;letter-spacing:1px;}
  .certName{font-size:clamp(30px,8vw,42px);color:#3a0ca3;margin:6px 0 4px;border-bottom:3px solid #ffd93d;display:inline-block;padding:0 18px 2px;}
  .certBody{font-family:'Gaegu',cursive;font-weight:700;font-size:clamp(15px,3.8vw,18px);line-height:1.55;margin-top:6px;}
  .certFoot{display:flex;justify-content:space-between;font-family:'Gaegu',cursive;font-weight:700;font-size:clamp(13px,3.2vw,15px);margin-top:12px;color:#6c584c;}
  .certStamp{
    position:absolute;right:10px;top:8px;width:58px;height:58px;border-radius:50%;
    border:3px solid #e63946;color:#e63946;display:grid;place-items:center;
    font-size:13px;line-height:1.1;transform:rotate(12deg);background:rgba(230,57,70,.06);
  }
</style>
</head>
<body>

<div id="webgl"></div>
<canvas id="fx"></canvas>

<div id="topbar">
  <div id="title">🌟 꼬마 우주 탐험대</div>
  <div id="badges">
    <div class="miniBadge" id="rankBadge">🐣 견습 우주인</div>
    <div class="miniBadge" id="starBadge">💫 <span id="starCount">0</span></div>
    <div class="miniBadge" id="moonBadge">🌙 <span id="moonCount">0</span>/11</div>
    <div id="stickers"></div>
  </div>
</div>

<div id="controls">
  <button class="ctl" id="zoomIn" aria-label="가까이">＋</button>
  <button class="ctl" id="zoomOut" aria-label="멀리">－</button>
  <button class="ctl" id="zoomReset" aria-label="전체 보기" style="font-size:22px;">🏠</button>
  <button class="ctl" id="pauseBtn" aria-label="멈춤/재생" style="font-size:22px;">⏸️</button>
</div>

<div id="hint" class="hide">행성을 눌러 보세요!</div>
<div id="countdown"><div id="countNum">3</div></div>

<div class="panel" id="infoPanel" role="dialog">
  <div class="emoji" id="infoEmoji"></div>
  <h2 id="infoName"></h2>
  <p id="infoDesc"></p>
  <div class="fun" id="infoFun"></div>
  <div class="moonsLine" id="infoMoons"></div>
  <div>
    <button class="pBtn pink" id="quizStartBtn">OX 퀴즈 풀기! ✏️</button>
    <button class="pBtn gray" id="infoCloseBtn">닫기</button>
  </div>
</div>

<div class="panel" id="quizPanel" role="dialog">
  <div class="qNum" id="quizNum"></div>
  <h2 id="quizTitle"></h2>
  <div id="quizQ"></div>
  <div id="oxRow">
    <button class="oxBtn" id="btnO">O</button>
    <button class="oxBtn" id="btnX">X</button>
  </div>
  <div id="feedback"></div>
  <div id="quizStars"></div>
  <button class="pBtn gray" id="quizCloseBtn" style="display:none;">우주로 돌아가기 🚀</button>
</div>

<div class="overlay" id="intro">
  <div>
    <div class="big" id="introAvatar">👨‍🚀</div>
    <h1>꼬마 우주 탐험대 3D</h1>
    <p>우주 비행사 이름을 알려 주세요!</p>
    <input id="nameInput" placeholder="이름을 써 주세요" maxlength="8" autocomplete="off">
    <p style="margin:14px 0 6px;">나만의 우주 비행사를 골라요!</p>
    <div id="avatarRow">
      <button class="avBtn sel" data-av="👨‍🚀">👨‍🚀</button>
      <button class="avBtn" data-av="🦸">🦸</button>
      <button class="avBtn" data-av="🐶">🐶</button>
      <button class="avBtn" data-av="🦖">🦖</button>
      <button class="avBtn" data-av="🤖">🤖</button>
      <button class="avBtn" data-av="🐯">🐯</button>
    </div>
    <button id="startBtn">🚀 발사 준비!</button>
  </div>
</div>

<div class="overlay" id="party">
  <div>
    <h1 id="partyTitle">🎉 우주 박사 탄생! 🎉</h1>
    <p id="partyMsg"></p>
    <div id="cert">
      <div class="certTitle">🚀 우주 비행사 자격증 🚀</div>
      <div class="certName" id="certName"></div>
      <div class="certBody">위 어린이는 태양계 행성 8개를 씩씩하게 탐험하고<br>
      OX 퀴즈를 훌륭하게 통과하였기에<br>
      <b>‘꼬마 우주 박사’</b>로 임명합니다.</div>
      <div class="certFoot"><span id="certDate"></span><span>꼬마 우주 탐험대 🪐</span></div>
      <div class="certStamp">⭐<br>합격</div>
    </div>
    <button id="againBtn">한 번 더 탐험하기 🚀</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ═══════════ 데이터: 행성 (퀴즈는 풀에서 랜덤 5개 출제) ═══════════ */
const PLANETS=[
 {id:'mercury',name:'수성',emoji:'🪨',orbit:75,size:7,spd:.85,rot:.6,
  desc:'태양과 제일 가까운 제일 작은 행성!',fun:'💡 낮에는 엄청 뜨겁고 밤에는 엄청 추워요!',
  quiz:[['수성은 태양과 제일 가까운 행성이에요.',1],['수성에는 커다란 바다가 있어요.',0],
   ['수성은 태양계에서 제일 작은 행성이에요.',1],['수성의 밤은 따뜻하고 포근해요.',0],
   ['수성은 달처럼 울퉁불퉁해요.',1],['수성에서는 1년이 아주 짧아요.',1],
   ['수성에는 두꺼운 공기가 있어요.',0],['수성은 태양 주위를 제일 빨리 돌아요.',1]],
  moons:[]},
 {id:'venus',name:'금성',emoji:'✨',orbit:110,size:11,spd:.62,rot:.3,
  desc:'밤하늘에서 제일 반짝이는 행성!',fun:'💡 태양계에서 제일 뜨거운 행성이에요. 앗 뜨거!',
  quiz:[['금성은 태양계에서 제일 뜨거운 행성이에요.',1],['금성은 밤하늘에서 반짝반짝 잘 보여요.',1],
   ['금성에는 사람들이 살고 있어요.',0],['금성은 파란색 행성이에요.',0],
   ['금성은 지구의 이웃 행성이에요.',1],['금성은 새벽이나 저녁에 잘 보여요.',1],

  quiz:[['지구에는 넓은 바다가 있어요.',1],['지구의 위성은 달이에요.',1],

   ['지구의 바다는 빨간색이에요.',0],['지구에는 많은 동물과 식물이 살아요.',1]],
  moons:[{name:'달',emoji:'🌙',r:22,size:3.5,spd:2.2,fact:'밤하늘의 달! 토끼가 산다는 이야기도 있어요 🐰',
   quiz:[['달은 지구 주위를 돌아요.',1],['달에는 토끼가 진짜 살아요.',0],
    ['사람이 달에 가 본 적이 있어요.',1],['달은 스스로 빛을 내요.',0],
    ['달 표면에는 구덩이(크레이터)가 많아요.',1],['달은 네모 모양이에요.',0]]}]},
 {id:'mars',name:'화성',emoji:'🔴',orbit:190,size:9,spd:.38,rot:1.1,
  desc:'빨간 모래로 덮인 빨간 행성!',fun:'💡 로봇 탐험차가 화성을 돌아다니고 있어요!',
  quiz:[['화성은 빨간 행성이라고 불러요.',1],['화성에는 로봇 탐험차가 있어요.',1],

    quiz:[['포보스는 화성의 위성이에요.',1],['포보스는 감자처럼 울퉁불퉁해요.',1],
     ['포보스는 지구의 달보다 커요.',0],['포보스는 화성과 점점 가까워지고 있어요.',1],
     ['포보스는 매끈한 공 모양이에요.',0]]},
   {name:'데이모스',emoji:'🪨',r:25,size:2,spd:1.8,fact:'화성의 작고 귀여운 둘째 위성이에요!',
    quiz:[['데이모스는 화성의 위성이에요.',1],['데이모스는 포보스보다 작아요.',1],

 {id:'jupiter',name:'목성',emoji:'🟠',orbit:255,size:26,spd:.21,rot:1.8,
  desc:'태양계에서 제일 큰 왕! 행성',fun:'💡 지구가 1,300개나 들어갈 만큼 커요!',
  quiz:[['목성은 태양계에서 제일 큰 행성이에요.',1],['목성에는 커다란 빨간 점이 있어요.',1],
   ['목성은 지구보다 작아요.',0],['목성은 위성 친구가 아주 많아요.',1],

let audioCtx;
function beep(freq,dur=0.15,type='sine',vol=0.15){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function makeTexture(id){
  const c=document.createElement('canvas');c.width=256;c.height=128;
  const g=c.getContext('2d');
  const band=cols=>{const gr=g.createLinearGradient(0,0,0,128);cols.forEach(([s,col])=>gr.addColorStop(s,col));g.fillStyle=gr;g.fillRect(0,0,256,128);};
  const blobs=(n,cols,r0,r1)=>{for(let i=0;i<n;i++){g.fillStyle=cols[i%cols.length];g.beginPath();
    g.ellipse(Math.random()*256,Math.random()*128,r0+Math.random()*(r1-r0),(r0+Math.random()*(r1-r0))*0.6,Math.random()*Math.PI,0,Math.PI*2);g.fill();}};
  switch(id){
    case 'sun':
      band([[0,'#ffd166'],[0.5,'#ffb703'],[1,'#fb8500']]);
      blobs(40,['rgba(255,240,180,.4)','rgba(240,120,30,.35)'],4,14);break;
    case 'mercury':
      band([[0,'#9c9c9c'],[1,'#6e6e6e']]);
      blobs(28,['rgba(70,70,70,.7)','rgba(150,150,150,.5)'],3,9);
      for(let i=0;i<14;i++){g.strokeStyle='rgba(200,200,200,.35)';g.lineWidth=1.4;
        g.beginPath();g.arc(Math.random()*256,Math.random()*128,3+Math.random()*6,0,Math.PI*2);g.stroke();}break;
    case 'venus':
      band([[0,'#f6d186'],[0.5,'#e8a85c'],[1,'#d98e4a']]);
      blobs(16,['rgba(255,236,179,.45)','rgba(196,124,60,.35)'],14,34);break;
    case 'earth':
      band([[0,'#1c6dd0'],[1,'#0b4f9e']]);
      blobs(9,['#5aa02c','#3f7d22'],12,30);
      blobs(12,['rgba(255,255,255,.55)'],8,20);
      g.fillStyle='rgba(255,255,255,.9)';g.fillRect(0,0,256,9);g.fillRect(0,119,256,9);break;
    case 'mars':
      band([[0,'#d65a3a'],[0.5,'#c1442e'],[1,'#a33422']]);
      blobs(14,['rgba(120,40,25,.5)','rgba(230,140,100,.4)'],8,22);
      g.fillStyle='rgba(255,255,255,.85)';g.fillRect(0,0,256,8);break;
    case 'jupiter':
      band([[0,'#e8d8b8'],[0.13,'#caa472'],[0.22,'#efe3c8'],[0.34,'#b97f4e'],[0.46,'#e9d9b9'],[0.58,'#c89a64'],[0.7,'#f0e4ca'],[0.84,'#bb8755'],[1,'#e3d2ae']]);
      g.fillStyle='#c4502e';g.beginPath();g.ellipse(70,86,20,11,0,0,Math.PI*2);g.fill();
      g.fillStyle='#e07a52';g.beginPath();g.ellipse(70,86,13,7,0,0,Math.PI*2);g.fill();break;
    case 'saturn':
      band([[0,'#f2e3bd'],[0.2,'#e0c489'],[0.4,'#f4e7c5'],[0.6,'#d9bd83'],[0.8,'#f0e0ba'],[1,'#cfae74']]);break;
    case 'uranus':
      band([[0,'#a8e6e2'],[0.5,'#6fd1cf'],[1,'#4db8bd']]);
      blobs(6,['rgba(255,255,255,.25)'],16,36);break;
    case 'neptune':
      band([[0,'#4d7ee8'],[0.5,'#2f55c4'],[1,'#1d3a9e']]);
      blobs(8,['rgba(255,255,255,.28)','rgba(20,35,110,.4)'],10,24);
      g.fillStyle='rgba(10,20,80,.65)';g.beginPath();g.ellipse(160,55,18,10,0,0,Math.PI*2);g.fill();break;
    default:
      band([[0,'#cfcfd8'],[1,'#8e8ea0']]);
      blobs(14,['rgba(90,90,110,.5)','rgba(220,220,235,.4)'],2,6);
  }
  return new THREE.CanvasTexture(c);
}
function makeTextSprite(text,h=26,color='#fff8e1'){
  const c=document.createElement('canvas');const m=c.getContext('2d');
  m.font='bold 36px Jua, sans-serif';
  const w=Math.ceil(m.measureText(text).width)+24;
  c.width=w;c.height=56;
  const g=c.getContext('2d');
  g.font='bold 36px Jua, sans-serif';g.textAlign='center';g.textBaseline='middle';
  g.lineWidth=7;g.strokeStyle='rgba(0,0,0,.65)';g.strokeText(text,w/2,30);
  g.fillStyle=color;g.fillText(text,w/2,30);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(w/56*h,h,1);
  return sp;
}

let camTheta=0.95,camPhi=0.95,camR=780,desiredR=780;
let thVel=0,phVel=0; // 드래그 관성
const freeTarget=new THREE.Vector3(); // 팬(옆 이동) 위치
const camTarget=new THREE.Vector3(0,0,0);
let followObj=null,controlsOn=false;
function applyCamera(){
  camPhi=Math.max(0.12,Math.min(1.5,camPhi));
  camera.position.set(
    camTarget.x+camR*Math.cos(camPhi)*Math.cos(camTheta),
    camTarget.y+camR*Math.sin(camPhi),
    camTarget.z+camR*Math.cos(camPhi)*Math.sin(camTheta));
  camera.lookAt(camTarget);
}
const pointers=new Map();let dragDist=0,lastPinch=0,lastPan=null;
const dom=renderer.domElement;
dom.addEventListener('pointerdown',e=>{dom.setPointerCapture(e.pointerId);pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});dragDist=0;thVel=0;phVel=0;});
dom.addEventListener('pointermove',e=>{
  if(!pointers.has(e.pointerId))return;
  const prev=pointers.get(e.pointerId);
  if(pointers.size===1&&controlsOn){
    const dTh=(e.clientX-prev.x)*0.005, dPh=(e.clientY-prev.y)*0.004;
    camTheta+=dTh;camPhi+=dPh;
    thVel=dTh*60;phVel=dPh*60;
    dragDist+=Math.hypot(e.clientX-prev.x,e.clientY-prev.y);
  }
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2&&controlsOn){
    const pts=[...pointers.values()];
    const d=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
    if(lastPinch>0)desiredR=Math.max(45,Math.min(2800,desiredR*lastPinch/d));
    lastPinch=d;dragDist=99;
    // 두 손가락으로 끌면 화면 이동(팬)
    const cx=(pts[0].x+pts[1].x)/2, cy=(pts[0].y+pts[1].y)/2;
    if(lastPan){
      const dx=cx-lastPan.x, dy=cy-lastPan.y;
      const right=new THREE.Vector3().setFromMatrixColumn(camera.matrix,0);
      const up=new THREE.Vector3().setFromMatrixColumn(camera.matrix,1);
      const k=camR*0.0016;
      freeTarget.addScaledVector(right,-dx*k).addScaledVector(up,dy*k);
      if(followObj){followObj.getWorldPosition(freeTarget);followObj=null;
        freeTarget.addScaledVector(right,-dx*k).addScaledVector(up,dy*k);}
    }
    lastPan={x:cx,y:cy};
  }
});
function endPtr(e){
  if(pointers.has(e.pointerId)&&pointers.size===1&&dragDist<8&&controlsOn)handleTap(e.clientX,e.clientY);
  pointers.delete(e.pointerId);
  if(pointers.size<2){lastPinch=0;lastPan=null;}
}
dom.addEventListener('pointerup',endPtr);
dom.addEventListener('pointercancel',endPtr);
dom.addEventListener('wheel',e=>{e.preventDefault();if(controlsOn)desiredR=Math.max(45,Math.min(2800,desiredR*(e.deltaY>0?1.13:1/1.13)));updateHint();},{passive:false});

const fx=document.getElementById('fx');const fctx=fx.getContext('2d');
let W=innerWidth,H=innerHeight,DPR=Math.min(devicePixelRatio||1,2);
function resize(){

  H=document.documentElement.clientHeight||innerHeight;

const meteors=[],floaters=[];let meteorTimer=3;
function spawnMeteor(){
  const side=Math.random();let m;
  if(side<0.5)m={x:Math.random()*W,y:-30,vx:(Math.random()<0.5?-1:1)*(75+Math.random()*110),vy:85+Math.random()*95};
  else if(side<0.75)m={x:-30,y:Math.random()*H*0.6,vx:105+Math.random()*110,vy:60+Math.random()*85};
  else m={x:W+30,y:Math.random()*H*0.6,vx:-(105+Math.random()*110),vy:60+Math.random()*85};
  meteors.push(m);
}
function drawFX(rawDt,t){
  fctx.setTransform(DPR,0,0,DPR,0,0);
  fctx.clearRect(0,0,W,H);
  meteorTimer-=rawDt;
  if(meteorTimer<=0){
    if(mode==='play')spawnMeteor();
    meteorTimer=2.4+Math.random()*2.8;
  }
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.x+=m.vx*rawDt;m.y+=m.vy*rawDt;
    if(m.x<-130||m.x>W+130||m.y>H+130){meteors.splice(i,1);continue;}
    const sp=Math.hypot(m.vx,m.vy),ux=m.vx/sp,uy=m.vy/sp,len=80;
    const g=fctx.createLinearGradient(m.x,m.y,m.x-ux*len,m.y-uy*len);
    g.addColorStop(0,'rgba(255,255,230,.95)');g.addColorStop(1,'rgba(255,255,230,0)');
    fctx.strokeStyle=g;fctx.lineWidth=2.5;fctx.lineCap='round';
    fctx.beginPath();fctx.moveTo(m.x,m.y);fctx.lineTo(m.x-ux*len,m.y-uy*len);fctx.stroke();
    fctx.fillStyle='#fffbe6';
    fctx.beginPath();fctx.arc(m.x,m.y,3.2,0,Math.PI*2);fctx.fill();
    fctx.strokeStyle='rgba(255,217,61,.55)';fctx.lineWidth=1.5;
    fctx.beginPath();fctx.arc(m.x,m.y,8+Math.sin(t*6)*2,0,Math.PI*2);fctx.stroke();
  }
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];f.t+=rawDt;
    if(f.t>1){floaters.splice(i,1);continue;}
    fctx.globalAlpha=1-f.t;
    fctx.font='22px Jua';fctx.textAlign='center';fctx.fillStyle='#ffd93d';
    fctx.fillText(f.txt,f.x,f.y-f.t*46);
    fctx.globalAlpha=1;
  }
}

const raycaster=new THREE.Raycaster();
function handleTap(sx,sy){
  if(quizPanel.classList.contains('show')||infoPanel.classList.contains('show'))return;
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    if(Math.hypot(sx-m.x,sy-m.y)<38){
      meteors.splice(i,1);starCaught++;
      document.getElementById('starCount').textContent=starCaught;
      floaters.push({x:sx,y:sy,t:0,txt:'+1 💫'});
      beep(1320,.15);setTimeout(()=>beep(1760,.18),100);
      updateRank();return;
    }
  }
  if(flight.flying)return;
  raycaster.setFromCamera(new THREE.Vector2(sx/W*2-1,-(sy/H)*2+1),camera);
  const hits=raycaster.intersectObjects(clickables,false);
  if(!hits.length)return;
  const u=hits[0].object.userData;
  if(u.type==='body'){
    const b=u.body;
    const obj=b.id==='sun'?sunMesh:b.id==='blackhole'?bhGroup:SYS[b.id].carrier;
    followObj=obj;desiredR=Math.max(70,b.size*8);
    flyToObj(obj,b.size,()=>openBody(b));
  }else if(u.type==='moon'){
    const ent=SYS[u.planet.id].moons[u.idx];
    followObj=SYS[u.planet.id].carrier;
    flyToObj(ent.mesh,u.moon.size+3,()=>openMoon(u.planet,u.moon,u.idx));
  }else if(u.type==='belt'){
    openBody(BELT_INFO);
  }else if(u.type==='const'){
    openSimple({name:u.cs.name,emoji:u.cs.emoji,desc:u.cs.desc,fun:u.cs.fun,line:'✨ 밤하늘에서 직접 찾아보세요!'});
  }
}

/* ═══════════ 발사 시퀀스 + 메인 루프 ═══════════ */
let seqT=0,lastNum=null;
let camFrom=new THREE.Vector3(),lookFrom=new THREE.Vector3();
const clock=new THREE.Clock();
const earthCar=()=>SYS['earth'].carrier;

function startLaunch(){
  mode='count';seqT=0;lastNum=null;
  earthCar().getWorldPosition(tmpV);
  rocket.position.copy(tmpV).add(new THREE.Vector3(0,PLANETS[2].size+5,0));
  rocket.rotation.set(-Math.PI/2,0,0); // +Z(앞)가 하늘 방향
  flameMesh.visible=false;
  document.getElementById('countdown').classList.add('show');
}
function animate(){
  requestAnimationFrame(animate);
  const rawDt=Math.min(clock.getDelta(),0.05);
  const dt=paused?0:rawDt;
  const t=clock.elapsedTime;

  /* 공전/자전 */
  PLANETS.forEach(p=>{
    const s=SYS[p.id];
    s.pivot.rotation.y+=p.spd*dt*0.3;
    s.mesh.rotation.y+=p.rot*dt*0.12;
    s.moons.forEach((mn,j)=>mn.pivot.rotation.y+=p.moons[j].spd*dt*0.38);
  });
  sunMesh.rotation.y+=dt*0.03;
  beltObj.rotation.y+=dt*0.012;
  bhDisk.rotation.z+=dt*0.9;
  bhParts.arr.forEach((pt,i)=>{
    pt.a+=dt*(3.4-pt.r/40);pt.r-=dt*7;
    if(pt.r<BHD.size*1.2){pt.r=BHD.size*1.6+Math.random()*BHD.size*2.4;pt.a=Math.random()*Math.PI*2;}
    bhParts.pos.set([Math.cos(pt.a)*pt.r,(Math.random()-0.5)*2,Math.sin(pt.a)*pt.r*0.55],i*3);
  });
  bhParts.pts.geometry.attributes.position.needsUpdate=true;

  /* 위성 ❓ 반짝 */
  const pulse=1+Math.sin(t*4)*0.18;
  PLANETS.forEach(p=>SYS[p.id].moons.forEach(mn=>{if(mn.q.visible)mn.q.scale.setScalar(pulse);}));

  /* 은하 페이드 */
  const gOp=Math.max(0,Math.min(0.95,(camR-1100)/1100));
  galaxyMats.forEach(m=>m.opacity=gOp);
  galaxyGroup.rotation.y+=dt*0.004;

  /* 발사 시퀀스 */
  if(mode==='intro'){
    applyCamera();
  }else if(mode==='count'){
    seqT+=rawDt;
    earthCar().getWorldPosition(tmpV);
    rocket.position.copy(tmpV).add(new THREE.Vector3(0,PLANETS[2].size+5,0));
    camera.position.copy(rocket.position).add(new THREE.Vector3(26,8,34));
    camera.lookAt(rocket.position);
    const n=3-Math.floor(seqT);
    if(n!==lastNum){
      lastNum=n;
      const el=document.getElementById('countNum');
      if(n>0){el.textContent=n;beep(440,.25);el.style.animation='none';void el.offsetWidth;el.style.animation='';}
      else{el.textContent='발사! 🚀';beep(880,.4);rumble();}
    }
    if(seqT>=3.8){
      document.getElementById('countdown').classList.remove('show');
      mode='liftoff';seqT=0;flameMesh.visible=true;
    }
  }else if(mode==='liftoff'){
    seqT+=rawDt;
    rocket.position.y+=rawDt*(26+seqT*42);
    flameMesh.scale.y=1+Math.sin(t*40)*0.25;
    camera.position.set(rocket.position.x+26+(Math.random()-0.5)*2.2,
      rocket.position.y-6+(Math.random()-0.5)*2.2,
      rocket.position.z+34+(Math.random()-0.5)*2.2);
    camera.lookAt(rocket.position);
    if(seqT>=2.4){
      mode='pullback';seqT=0;
      camFrom.copy(camera.position);lookFrom.copy(rocket.position);
    }
  }else if(mode==='pullback'){
    seqT+=rawDt;
    const e=Math.min(1,seqT/3);
    const s=e*e*(3-2*e);
    camTarget.set(0,0,0);
    const end=new THREE.Vector3(
      camR*Math.cos(camPhi)*Math.cos(camTheta),
      camR*Math.sin(camPhi),
      camR*Math.cos(camPhi)*Math.sin(camTheta));
    camera.position.lerpVectors(camFrom,end,s);
    tmpV2.lerpVectors(lookFrom,camTarget,s);
    camera.lookAt(tmpV2);
    flameMesh.visible=false;
    flight.followGet=()=>bodyLandPoint(earthCar(),PLANETS[2].size);
    if(seqT>=3){
      mode='play';controlsOn=true;
      updateHint();
      toast(`🚀 ${playerName}, 우주에 도착했어요! 행성을 눌러 봐요!`);
    }
  }else if(mode==='play'){
    /* 로켓 비행 */
    if(flight.flying){
      flight.t+=rawDt/flight.dur;
      const e=Math.min(1,flight.t);
      const s=e*e*(3-2*e);
      const tgt=flight.getTarget();
      tmpV2.lerpVectors(flight.from,tgt,s);
      if(tmpV2.distanceToSquared(rocket.position)>0.0001){
        tmpV.copy(tmpV2).sub(rocket.position).add(tmpV2);
        rocket.lookAt(tmpV);
      }
      rocket.position.copy(tmpV2);
      flameMesh.scale.y=1+Math.sin(t*40)*0.25;
      if(flight.t>=1){
        flight.flying=false;flameMesh.visible=false;
        flight.followGet=flight.getTarget;
        const cb=flight.onArrive;flight.onArrive=null;
        if(cb)cb();
      }
    }else if(flight.followGet){
      rocket.position.lerp(flight.followGet(),0.18);
      rocket.position.y+=Math.sin(t*2.2)*0.15;
    }
    /* 카메라: 관성 + 부드러운 따라가기 */
    if(pointers.size===0){
      camTheta+=thVel*rawDt;camPhi+=phVel*rawDt;
      const damp=Math.pow(0.1,rawDt);
      thVel*=damp;phVel*=damp;
    }
    if(followObj)followObj.getWorldPosition(tmpV);
    else tmpV.copy(freeTarget);
    camTarget.lerp(tmpV,1-Math.pow(0.015,rawDt));
    camR+=(desiredR-camR)*(1-Math.pow(0.03,rawDt));
    applyCamera();
  }

  drawFX(rawDt,t);
  renderer.render(scene,camera);
}
animate();

/* ═══════════ 커스터마이징/시작/축하 ═══════════ */
document.querySelectorAll('.avBtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.avBtn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');avatar=b.dataset.av;
    document.getElementById('introAvatar').textContent=avatar;beep(750,.1);
  };
});
document.getElementById('startBtn').onclick=()=>{
  const v=document.getElementById('nameInput').value.trim();
  if(v)playerName=v;
  document.getElementById('title').textContent=`${avatar} ${playerName}의 우주 탐험대`;
  const old=avatarSp.material.map;
  const ns=makeTextSprite(avatar,16);
  avatarSp.material.map=ns.material.map;avatarSp.scale.copy(ns.scale);
  if(old)old.dispose();
  beep(660,.15);
  document.getElementById('intro').classList.add('hide');
  startLaunch();
};
function showParty(){
  fanfare();
  document.getElementById('partyTitle').textContent=`🎉 ${playerName} 우주 박사 탄생! 🎉`;
  const msg=document.getElementById('partyMsg');
  if(moonsFound.size===TOTAL_MOONS)
    msg.innerHTML=`태양·블랙홀·소행성대·행성 퀴즈 11개 + 위성 11개를 모두 찾았어요!<br>최고의 꼬마 우주 박사예요! ${avatar}🏆`;
  else msg.innerHTML=`태양, 블랙홀, 소행성대, 행성 8개 퀴즈를 모두 풀었어요! ${avatar}`;
  document.getElementById('certName').textContent=`${avatar} ${playerName}`;
  const d=new Date();
  document.getElementById('certDate').textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  document.getElementById('party').classList.add('show');
  const emojis=['🎉','⭐','🚀','🌟','🪐','✨','🌙'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='confetti';
      c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      c.style.left=Math.random()*100+'%';
      c.style.animationDuration=(Math.random()*2+2.5)+'s';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),5200);
    },i*80);
  }
}
document.getElementById('againBtn').onclick=()=>{
  quizDone.clear();
  document.querySelectorAll('.sticker').forEach(s=>s.classList.remove('got'));
  document.getElementById('party').classList.remove('show');
  followObj=null;desiredR=780;
};
</script>
