<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>매일 프리토킹 — 영어 말하기 훈련</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --ink:#232946; --ink-soft:#5a6178; --line:#e4e7f2;
  --bg:#f4f6ff; --card:#ffffff;
  --indigo:#5b5fe9; --indigo-deep:#4347c9; --indigo-soft:#e6e7fd;
  --coral:#ff7a59; --coral-deep:#e05f3f;
  --amber:#ffb800; --amber-deep:#e0a300;
  --green:#2fbf71; --green-deep:#24a05d; --green-soft:#e2f7ec;
  --red:#ef4b5f; --red-soft:#fde7ea;
  --sky:#38b6e3;
  --vh:100vh;
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink);
  height:var(--vh); overflow:hidden;
  -webkit-font-smoothing:antialiased;
  user-select:none;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}

#app{height:var(--vh);display:flex;flex-direction:column;max-width:560px;margin:0 auto;background:var(--bg);position:relative}

/* ===== top bar ===== */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--card);border-bottom:2px solid var(--line);
  position:relative;z-index:5;
}
.tb-item{display:flex;align-items:center;gap:5px;font-weight:800;font-size:15px}
.tb-item .ico{font-size:18px}
.tb-streak{color:var(--coral)} .tb-pts{color:var(--amber-deep)} .tb-lv{color:var(--indigo)}
.tb-lv{background:var(--indigo-soft);padding:4px 10px;border-radius:999px;font-size:13px}

/* ===== main scroll area ===== */
main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:12px}
.scr{display:none;min-height:100%}
.scr.on{display:block}

/* ===== home / map ===== */
#posBanner{
  margin:12px 14px 4px;padding:14px 16px;border-radius:var(--radius);
  background:var(--indigo);color:#fff;box-shadow:0 4px 0 var(--indigo-deep);
  cursor:pointer;
}
#posBanner .pb-sub{font-size:12px;font-weight:700;opacity:.85;letter-spacing:.3px}
#posBanner .pb-title{font-size:17px;font-weight:800;margin-top:3px}
#reviewBadge{
  margin:10px 14px 0;padding:12px 16px;border-radius:var(--radius);
  background:var(--card);border:2px solid var(--sky);color:var(--ink);
  font-weight:800;font-size:14px;display:none;align-items:center;justify-content:space-between;cursor:pointer;
}
#reviewBadge.on{display:flex}
#reviewBadge .rb-go{color:var(--sky);font-size:13px}

#map{padding:6px 0 30px}
.sec-head{
  margin:22px 14px 6px;padding:14px 16px;border-radius:var(--radius);
  color:#fff;font-weight:800;
}
.sec-head .sh-num{font-size:11px;opacity:.8;letter-spacing:1px}
.sec-head .sh-title{font-size:18px;margin-top:2px}
.unit-head{
  margin:18px auto 8px;text-align:center;color:var(--ink-soft);
  font-size:13px;font-weight:800;display:flex;align-items:center;gap:10px;padding:0 24px;
}
.unit-head::before,.unit-head::after{content:"";flex:1;height:2px;background:var(--line);border-radius:2px}
.stage-row{display:flex;justify-content:center;padding:7px 0;position:relative}
.stage-node{
  width:74px;height:74px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  font-size:30px;position:relative;transition:transform .1s;
  box-shadow:0 6px 0 rgba(0,0,0,.18);
}
.stage-node:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.18)}
.stage-node.done{background:var(--amber);box-shadow:0 6px 0 var(--amber-deep)}
.stage-node.cur{background:var(--indigo);box-shadow:0 6px 0 var(--indigo-deep)}
.stage-node.lock{background:#d8dbe8;box-shadow:0 6px 0 #b9bdd1;filter:grayscale(.4);opacity:.85}
.stage-node.mine{background:var(--coral);box-shadow:0 6px 0 var(--coral-deep)}
.stage-node .chk{
  position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:50%;
  background:var(--green);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;
  border:3px solid var(--bg);
}
.stage-node.cur::before{
  content:"";position:absolute;inset:-9px;border-radius:50%;
  border:4px solid var(--indigo);opacity:.35;animation:pulse 1.6s infinite;
}
@keyframes pulse{0%{transform:scale(.92);opacity:.5}70%{transform:scale(1.08);opacity:0}100%{opacity:0}}
.stage-tip{
  position:absolute;top:-34px;left:50%;transform:translateX(-50%);
  background:var(--card);border:2px solid var(--indigo);color:var(--indigo);
  font-size:12px;font-weight:800;padding:5px 12px;border-radius:10px;white-space:nowrap;
  animation:bob 1.4s ease-in-out infinite;z-index:2;
}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-5px)}}

/* ===== generic panels ===== */
.panel{background:var(--card);border:2px solid var(--line);border-radius:var(--radius);padding:16px;margin:12px 14px}
.panel h3{font-size:15px;margin-bottom:10px}
.big-btn{
  display:block;width:100%;padding:15px;border-radius:16px;text-align:center;
  font-weight:800;font-size:16px;color:#fff;background:var(--indigo);
  box-shadow:0 4px 0 var(--indigo-deep);transition:transform .08s;
}
.big-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--indigo-deep)}
.big-btn.green{background:var(--green);box-shadow:0 4px 0 var(--green-deep)}
.big-btn.green:active{box-shadow:0 1px 0 var(--green-deep)}
.big-btn.gray{background:#c9cddd;box-shadow:0 4px 0 #aab0c5;color:#fff}
.big-btn:disabled{background:#c9cddd;box-shadow:0 4px 0 #aab0c5}
.sub-btn{
  display:inline-block;padding:9px 14px;border-radius:12px;font-weight:800;font-size:13px;
  background:var(--indigo-soft);color:var(--indigo);
}
.sub-btn.warn{background:var(--red-soft);color:var(--red)}

/* ===== tab bar ===== */
#tabbar{
  display:flex;background:var(--card);border-top:2px solid var(--line);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:5;
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border-radius:12px;color:#9aa0b5;font-size:10px;font-weight:800}
.tab .t-ico{font-size:22px;filter:grayscale(1);opacity:.6}
.tab.on{color:var(--indigo)}
.tab.on .t-ico{filter:none;opacity:1}
.tab .t-dot{position:absolute;margin-left:26px;width:9px;height:9px;border-radius:50%;background:var(--red);display:none}
.tab.noti .t-dot{display:block}

/* ===== session overlay ===== */
#session{
  position:absolute;inset:0;background:var(--bg);z-index:20;display:none;
  flex-direction:column;
}
#session.on{display:flex}
#sess-top{display:flex;align-items:center;gap:12px;padding:14px 16px 6px}
#sess-x{font-size:22px;color:#9aa0b5;font-weight:800;padding:4px 8px}
#sess-bar{flex:1;height:14px;background:#e0e3f0;border-radius:99px;overflow:hidden}
#sess-fill{height:100%;width:0%;background:var(--green);border-radius:99px;transition:width .3s}
#sess-body{flex:1;overflow-y:auto;padding:14px 18px 130px}
.q-label{font-size:13px;font-weight:800;color:var(--indigo);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.q-title{font-size:19px;font-weight:800;margin-bottom:16px;line-height:1.4}
.q-sent{
  background:var(--card);border:2px solid var(--line);border-radius:var(--radius);
  padding:18px 16px;font-size:20px;line-height:1.55;font-weight:600;
  display:flex;gap:12px;align-items:flex-start;margin-bottom:18px;
}
.q-sent .spk{font-size:26px;flex-shrink:0;padding:2px}
.q-sent .slow{font-size:20px;opacity:.6;margin-left:-6px}
.m-desc{font-size:14px;color:var(--ink-soft);font-weight:600;line-height:1.6;margin-bottom:16px}
#posBanner .pb-goal{font-size:12px;font-weight:800;margin-top:9px;background:rgba(255,255,255,.2);display:inline-block;padding:4px 11px;border-radius:99px}
.q-sent .txt b{color:var(--indigo);font-weight:800;border-bottom:3px solid var(--indigo-soft)}
.q-sent .txt .blank{
  display:inline-block;min-width:74px;border-bottom:3px solid var(--indigo);
  color:var(--indigo);text-align:center;font-weight:800;
}
.q-ko-big{
  background:var(--card);border:2px solid var(--line);border-radius:var(--radius);
  padding:26px 18px;font-size:22px;font-weight:800;text-align:center;line-height:1.5;margin-bottom:18px;
}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{
  background:var(--card);border:2px solid var(--line);border-radius:16px;
  padding:15px 16px;font-size:16px;font-weight:700;text-align:left;line-height:1.45;
  box-shadow:0 3px 0 var(--line);transition:transform .07s;
}
.choice:active{transform:translateY(2px)}
.choice.sel{border-color:var(--indigo);background:var(--indigo-soft);box-shadow:0 3px 0 var(--indigo);color:var(--indigo)}
.choice.right{border-color:var(--green);background:var(--green-soft);box-shadow:0 3px 0 var(--green);color:var(--green-deep)}
.choice.wrong{border-color:var(--red);background:var(--red-soft);box-shadow:0 3px 0 var(--red);color:var(--red)}
.reveal-box{
  background:var(--card);border:2px solid var(--indigo);border-radius:var(--radius);
  padding:18px;text-align:center;margin-bottom:16px;
}
.reveal-box .en{font-size:21px;font-weight:800;line-height:1.5}
.reveal-box .en b{color:var(--indigo)}
.reveal-box .ko{font-size:15px;color:var(--ink-soft);margin-top:8px;font-weight:600}
.mic-btn{
  width:84px;height:84px;border-radius:50%;background:var(--coral);color:#fff;font-size:36px;
  box-shadow:0 5px 0 var(--coral-deep);margin:6px auto;display:flex;align-items:center;justify-content:center;
}
.mic-btn.rec{animation:recPulse 1s infinite;background:var(--red);box-shadow:0 5px 0 #c22b3e}
@keyframes recPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.stt-result{margin-top:14px;font-size:17px;font-weight:700;text-align:center;line-height:1.6;min-height:26px}
.stt-result .ok{color:var(--green-deep)} .stt-result .no{color:var(--red)}
.center{text-align:center}
.hint{font-size:13px;color:var(--ink-soft);text-align:center;margin-top:10px;font-weight:600}

#sess-foot{
  position:absolute;left:0;right:0;bottom:0;background:var(--card);
  border-top:2px solid var(--line);padding:14px 16px calc(14px + env(safe-area-inset-bottom));z-index:3;
}
#sess-foot.fb-good{background:var(--green-soft);border-color:var(--green)}
#sess-foot.fb-bad{background:var(--red-soft);border-color:var(--red)}
.fb-line{font-weight:800;font-size:16px;margin-bottom:4px}
.fb-good .fb-line{color:var(--green-deep)} .fb-bad .fb-line{color:var(--red)}
.fb-detail{font-size:14px;color:var(--ink-soft);margin-bottom:12px;line-height:1.5;font-weight:600}
.grade-row{display:flex;gap:8px}
.grade-row .big-btn{font-size:14px;padding:13px 4px}
.g-again{background:var(--red);box-shadow:0 4px 0 #c22b3e}
.g-hard{background:var(--amber);box-shadow:0 4px 0 var(--amber-deep)}
.g-good{background:var(--green);box-shadow:0 4px 0 var(--green-deep)}

/* session end */
#sess-end{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
#sess-end .end-emoji{font-size:64px;animation:popIn .5s}
@keyframes popIn{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
#sess-end h2{font-size:24px;margin:12px 0 20px}
.end-cards{display:flex;gap:10px;width:100%;max-width:360px;margin-bottom:26px}
.end-card{flex:1;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:14px 6px}
.end-card .ec-v{font-size:22px;font-weight:800}
.end-card .ec-l{font-size:12px;color:var(--ink-soft);font-weight:700;margin-top:2px}
.ec-pts .ec-v{color:var(--amber-deep)} .ec-acc .ec-v{color:var(--green-deep)} .ec-str .ec-v{color:var(--coral)}

/* ===== review screen ===== */
.due-hero{text-align:center;padding:30px 16px 10px}
.due-hero .dh-n{font-size:52px;font-weight:800;color:var(--sky)}
.due-hero .dh-t{font-size:15px;font-weight:700;color:var(--ink-soft)}

/* ===== cards screen ===== */
.card-row{
  background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:12px 14px;margin:8px 14px;font-size:14px;line-height:1.5;
}
.card-row .cr-en{font-weight:800;font-size:15px}
.card-row .cr-en b{color:var(--indigo)}
.card-row .cr-ko{color:var(--ink-soft);font-weight:600}
.card-row .cr-meta{font-size:11px;color:#9aa0b5;font-weight:700;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card-row .cr-btns{margin-top:8px;display:flex;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;background:var(--indigo-soft);color:var(--indigo);font-weight:800;font-size:11px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:800;color:var(--ink-soft);margin-bottom:5px}
.field input,.field textarea,.field select{
  width:100%;padding:12px;border:2px solid var(--line);border-radius:12px;background:#fbfcff;
}
.field textarea{min-height:90px;resize:vertical}
#searchBox{width:calc(100% - 28px);margin:12px 14px 4px;padding:12px 14px;border:2px solid var(--line);border-radius:14px}

/* ===== stats ===== */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 14px}
.stat-cell{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:14px;text-align:center}
.stat-cell .sc-v{font-size:24px;font-weight:800;color:var(--indigo)}
.stat-cell .sc-l{font-size:12px;color:var(--ink-soft);font-weight:700;margin-top:2px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:110px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bar-col .b{width:100%;background:var(--sky);border-radius:6px 6px 0 0;min-height:3px}
.bar-col .bn{font-size:10px;font-weight:800;color:var(--ink-soft)}
.bar-col .bv{font-size:10px;font-weight:800;color:var(--sky)}
.prog-line{margin-bottom:12px}
.prog-line .pl-t{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:5px}
.prog-line .pl-bar{height:12px;background:#e0e3f0;border-radius:99px;overflow:hidden}
.prog-line .pl-fill{height:100%;background:var(--green);border-radius:99px}
.road-item{display:flex;gap:12px;margin-bottom:2px}
.road-item .ri-dot{width:16px;height:16px;border-radius:50%;background:var(--line);flex-shrink:0;margin-top:2px;border:3px solid var(--card)}
.road-item.now .ri-dot{background:var(--coral);box-shadow:0 0 0 3px #ffd9cd}
.road-item.past .ri-dot{background:var(--green)}
.road-item .ri-line{width:2px;flex:1;background:var(--line);margin:2px auto 0}
.road-item .ri-body{padding-bottom:18px}
.road-item .ri-t{font-weight:800;font-size:14px}
.road-item.now .ri-t{color:var(--coral)}
.road-item .ri-d{font-size:13px;color:var(--ink-soft);font-weight:600;margin-top:2px;line-height:1.5}
.ri-col{display:flex;flex-direction:column;align-items:center}

/* ===== modal ===== */
#modal{position:absolute;inset:0;background:rgba(30,34,60,.5);z-index:40;display:none;align-items:flex-end;justify-content:center}
#modal.on{display:flex}
#modal .m-box{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:88%;overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
#modal h3{font-size:17px;margin-bottom:14px}

.toast{
  position:absolute;top:66px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:13px;font-weight:700;
  padding:10px 18px;border-radius:99px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;
}
.toast.on{opacity:.95}
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="tb-item tb-streak"><span class="ico">🔥</span><span id="tbStreak">0</span></div>
    <div class="tb-item tb-lv"><span id="tbLevel">Lv.1</span></div>
    <div class="tb-item tb-pts"><span class="ico">⭐</span><span id="tbPts">0</span></div>
  </header>

  <main id="main">
    <section class="scr on" id="scr-home">
      <div id="posBanner"></div>
      <div id="reviewBadge"><span id="rbTxt"></span><span class="rb-go">복습하기 →</span></div>
      <div id="map"></div>
    </section>

    <section class="scr" id="scr-review">
      <div class="due-hero">
        <div class="dh-n" id="dueN">0</div>
        <div class="dh-t">오늘 복습할 문장</div>
      </div>
      <div class="panel" id="reviewPanel"></div>
      <div class="panel">
        <h3>📅 앞으로 7일 복습 예정</h3>
        <div class="bar-chart" id="reviewChart"></div>
      </div>
    </section>

    <section class="scr" id="scr-cards">
      <input id="searchBox" placeholder="🔍 문장 검색 (영어/한국어/태그)">
      <div style="display:flex;gap:8px;margin:10px 14px">
        <button class="big-btn" style="flex:1;font-size:14px;padding:12px" id="btnAddCard">+ 문장 추가</button>
        <button class="big-btn green" style="flex:1;font-size:14px;padding:12px" id="btnBulkAdd">📋 대량 추가</button>
      </div>
      <div id="cardList"></div>
    </section>

    <section class="scr" id="scr-stats">
      <div class="stat-grid" id="statGrid"></div>
      <div class="panel">
        <h3>📅 앞으로 7일 복습 예정</h3>
        <div class="bar-chart" id="statChart"></div>
      </div>
      <div class="panel">
        <h3>🗺️ 섹션별 진행도</h3>
        <div id="secProgress"></div>
      </div>
      <div class="panel">
        <h3>🏁 2년 로드맵</h3>
        <div id="roadmap"></div>
      </div>
    </section>

    <section class="scr" id="scr-settings">
      <div class="panel">
        <h3>🔊 학습 설정</h3>
        <div class="field"><label>발음 기본 속도</label>
          <select id="setRate"><option value="0.7">천천히 (0.7x)</option><option value="1">보통 (1.0x)</option></select>
        </div>
        <div class="field"><label>효과음</label>
          <select id="setSound"><option value="1">켜기</option><option value="0">끄기</option></select>
        </div>
        <div class="field"><label>하루 목표 (세션 수)</label>
          <select id="setGoal"><option value="1">1개 (가볍게)</option><option value="2">2개 (권장)</option><option value="3">3개</option><option value="4">4개</option></select>
        </div>
      </div>
      <div class="panel">
        <h3>💾 데이터 백업</h3>
        <p style="font-size:13px;color:var(--ink-soft);font-weight:600;line-height:1.6;margin-bottom:12px">
          기기를 바꾸거나 앱을 업그레이드하기 전에 내보내기로 백업하세요. 진도·통계·내 문장이 모두 저장됩니다.</p>
        <div style="display:flex;gap:8px">
          <button class="big-btn" style="flex:1;font-size:14px;padding:12px" id="btnExport">내보내기</button>
          <button class="big-btn green" style="flex:1;font-size:14px;padding:12px" id="btnImport">가져오기</button>
          <input type="file" id="importFile" accept=".json,application/json" style="display:none">
        </div>
      </div>
      <div class="panel">
        <h3>⚠️ 초기화</h3>

const LS_KEY="freetalk_v1";
const SEC_COLORS=["#5b5fe9","#38b6e3","#2fbf71","#ff7a59","#b45fe9","#e0a300"];
let S=null; // state

function defaultState(){
  return {
    version:1,
    srs:{},            // cardId -> {ease,interval,due,reps,lapses,learned}
    progress:{done:{}},// "si-ui-st" -> true
    custom:[],         // {id,en,ko,pattern,gloss,highlight,level,tags}

  };
}
function load(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){S=JSON.parse(raw); if(!S.version)S.version=1; migrate();}
    else S=defaultState();
  }catch(e){S=defaultState()}
}
function migrate(){ /* 이후 버전 업그레이드용 자리 */ }
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(S))}catch(e){toast("저장 공간이 부족해요")}}

/* ================= 카드 접근 ================= */
/* 내장 카드 id: b-si-ui-ci  /  사용자 카드 id: u<timestamp> */
function builtinCard(si,ui,ci){
  const u=CONTENT[si].units[ui], c=u.cs[ci];
  return {id:`b-${si}-${ui}-${ci}`,en:c[0],ko:c[1],pattern:u.ps[c[2]][0],gloss:u.ps[c[2]][1],
    highlight:c[3],level:u.lv,tags:[CONTENT[si].t,u.t],si,ui,ci,custom:false};
}
function allCards(){
  const out=[];
  CONTENT.forEach((sec,si)=>sec.units.forEach((u,ui)=>u.cs.forEach((c,ci)=>out.push(builtinCard(si,ui,ci)))));
  S.custom.forEach(c=>out.push({...c,custom:true}));
  return out;
}
function cardById(id){
  if(id[0]==="u")return {...S.custom.find(c=>c.id===id),custom:true};
  const[,si,ui,ci]=id.split("-").map(Number);
  return builtinCard(si,ui,ci);
}
function unitCards(si,ui){return CONTENT[si].units[ui].cs.map((c,ci)=>builtinCard(si,ui,ci))}

/* ================= 진행 맵 구조 =================
   유닛당 스테이지 5개: 0★새문장A 1📖듣기·읽기 2🏋️훈련 3★새문장B 4🎁종합상자 */
const STAGE_META=[
  {ico:"⭐",name:"새 문장 배우기"},
  {ico:"📖",name:"듣고 뜻 찾기"},
  {ico:"🏋️",name:"말하기 훈련"},
  {ico:"⭐",name:"새 문장 배우기"},
  {ico:"🎁",name:"종합 도전"}
];
function stageKey(si,ui,st){return `${si}-${ui}-${st}`}
function isDone(si,ui,st){return !!S.progress.done[stageKey(si,ui,st)]}
function currentPos(){
  for(let si=0;si<CONTENT.length;si++)
    for(let ui=0;ui<CONTENT[si].units.length;ui++)
      for(let st=0;st<5;st++)
        if(!isDone(si,ui,st))return{si,ui,st};
  return null; // 전부 완료
}
function stageCardPool(si,ui,st){
  const cs=unitCards(si,ui), half=Math.ceil(cs.length/2);
  if(st===0||st===1||st===2)return cs.slice(0,half);
  if(st===3)return cs.slice(half);
  return cs;
}

/* ================= SRS (SM-2 변형) ================= */
function srsOf(id){return S.srs[id]}
function srsEnroll(id,delayDays=1){
  if(S.srs[id])return;
  S.srs[id]={ease:2.5,interval:0,due:startOfDay(Date.now())+delayDays*DAY,reps:0,lapses:0};
}
function srsGrade(id,g){ // g: 0몰라요 1애매해요 2알아요
  const r=S.srs[id]||(S.srs[id]={ease:2.5,interval:0,due:Date.now(),reps:0,lapses:0});
  if(g===0){r.lapses++;r.reps=0;r.interval=0;r.ease=Math.max(1.3,r.ease-0.2);r.due=startOfDay(Date.now())+DAY*0.999;}
  else if(g===1){r.interval=Math.max(1,Math.round((r.interval||1)*1.2));r.ease=Math.max(1.3,r.ease-0.05);r.reps++;r.due=startOfDay(Date.now())+r.interval*DAY;}
  else{r.interval=r.reps===0?1:(r.interval<=1?3:Math.round(r.interval*r.ease));r.ease=Math.min(3,r.ease+0.03);r.reps++;r.due=startOfDay(Date.now())+r.interval*DAY;}
}
function dueCards(){
  const now=Date.now(), end=startOfDay(now)+DAY;
  return Object.keys(S.srs).filter(id=>S.srs[id].due<end).map(id=>{try{return cardById(id)}catch(e){return null}}).filter(c=>c&&c.en);
}
function dueInDays(){
  const base=startOfDay(Date.now()),out=[0,0,0,0,0,0,0];
  Object.values(S.srs).forEach(r=>{
    let d=Math.floor((r.due-base)/DAY); if(d<0)d=0;
    if(d<7)out[d]++;
  });
  return out;
}

/* ================= 포인트/스트릭 ================= */
function addPoints(p){S.stats.points+=p;daily().pts+=p;refreshTop()}
function daily(){const k=todayKey();return S.stats.daily[k]||(S.stats.daily[k]={pts:0,q:0,ok:0,sess:0})}
function bumpStreak(){
  const t=todayKey();
  if(S.stats.lastDay===t)return false;
  const y=todayKey(new Date(Date.now()-DAY));
  S.stats.streak=(S.stats.lastDay===y)?S.stats.streak+1:1;
  S.stats.lastDay=t;return true;
}
function level(){return 1+Math.floor(S.stats.points/500)}
function refreshTop(){
  $("#tbStreak").textContent=S.stats.streak;
  $("#tbPts").textContent=S.stats.points;
  $("#tbLevel").textContent="Lv."+level();
}

/* ================= 사운드 ================= */
let AC=null;
function beep(type){
  if(!S.settings.sound)return;
  try{if(navigator.vibrate)navigator.vibrate(type==="ok"?25:type==="no"?[50,40,50]:[30,30,30,30,90])}catch(e){}
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended")AC.resume();
    const play=(f,t0,dur,type2="sine",vol=0.18)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type=type2;o.frequency.value=f;o.connect(g);g.connect(AC.destination);
      g.gain.setValueAtTime(vol,AC.currentTime+t0);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+t0+dur);
      o.start(AC.currentTime+t0);o.stop(AC.currentTime+t0+dur+0.02);
    };
    if(type==="ok"){play(660,0,.12);play(880,.12,.18)}
    else if(type==="no"){play(196,0,.22,"square",0.1)}
    else if(type==="win"){play(523,0,.12);play(659,.12,.12);play(784,.24,.12);play(1047,.36,.3)}
  }catch(e){}
}

/* ================= TTS / STT ================= */
let voices=[];
function loadVoices(){voices=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.startsWith("en"))}
if("speechSynthesis" in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function speak(text,rate){
  if(!("speechSynthesis" in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";u.rate=rate||S.settings.ttsRate;
  const v=voices.find(v=>v.lang==="en-US"&&/google|samantha|natural/i.test(v.name))||voices.find(v=>v.lang==="en-US")||voices[0];
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const hasSTT=!!SR;
function listen(onResult,onEnd){
  const r=new SR();
  r.lang="en-US";r.interimResults=false;r.maxAlternatives=1;
  r.onresult=e=>onResult(e.results[0][0].transcript);
  r.onerror=()=>onEnd&&onEnd();
  r.onend=()=>onEnd&&onEnd();
  r.start();return r;
}
function normWords(s){return s.toLowerCase().replace(/[^a-z0-9' ]/g," ").split(/\s+/).filter(Boolean)}
function compareSpeech(target,said){
  const tw=normWords(target),sw=new Set(normWords(said));
  return tw.map(w=>`<span class="${sw.has(w)?"ok":"no"}">${esc(w)}</span>`).join(" ");
}

  return esc(en.slice(0,i))+"<b>"+esc(en.slice(i,i+hl.length))+"</b>"+esc(en.slice(i+hl.length));

/* ================= 문제 생성 ================= */
function otherGlosses(card,n){
  const pool=[];
  CONTENT.forEach(sec=>sec.units.forEach(u=>u.ps.forEach(p=>{if(p[1]!==card.gloss)pool.push(p[1])})));
  return shuffle([...new Set(pool)]).slice(0,n);
}
function otherKos(card,n){
  const pool=allCards().filter(c=>c.ko!==card.ko&&Math.abs((c.level||1)-(card.level||1))<=1).map(c=>c.ko);
  return shuffle([...new Set(pool)]).slice(0,n);
}
function otherHighlights(card,n){
  const pool=allCards().filter(c=>c.highlight&&c.highlight.toLowerCase()!==card.highlight.toLowerCase()).map(c=>c.highlight);
  return shuffle([...new Set(pool)]).slice(0,n);
}
function makeQ(card,type){
  if(type==="ctx"){
    const useGloss=!card.custom&&card.gloss;
    const correct=useGloss?card.gloss:card.ko;
    const wrongs=useGloss?otherGlosses(card,2):otherKos(card,2);
    return {type,card,correct,choices:shuffle([correct,...wrongs])};
  }
  if(type==="blank"){
    const wrongs=otherHighlights(card,2);
    return {type,card,correct:card.highlight,choices:shuffle([card.highlight,...wrongs])};
  }
  return {type,card}; // speak / shadow
}
function buildStageQs(si,ui,st){
  const pool=shuffle(stageCardPool(si,ui,st));
  const qs=[];
  if(st===0||st===3) pool.slice(0,8).forEach((c,i)=>qs.push(makeQ(c,i%2?"blank":"ctx")));
  else if(st===1)    pool.slice(0,8).forEach(c=>{const q=makeQ(c,"ctx");q.listen=true;qs.push(q)});
  else if(st===2)    pool.slice(0,8).forEach((c,i)=>qs.push(makeQ(c,i%2?"shadow":"speak")));
  else               pool.slice(0,10).forEach((c,i)=>qs.push(makeQ(c,["ctx","blank","speak","shadow"][i%4])));
  return qs;
}

/* ================= 세션 엔진 ================= */
let SESS=null,sessPushed=false;
function openSession(qs,ctx){ // ctx:{kind:"stage",si,ui,st} | {kind:"review"} | {kind:"custom",bonus}
  if(!qs.length){toast("학습할 문장이 없어요");return}
  SESS={qs,idx:0,ok:0,total:qs.length,pts:0,ctx,answered:0};
  if(!$("#session").classList.contains("on")){
    try{history.pushState({v:"sess"},"");sessPushed=true}catch(e){sessPushed=false}
  }
  $("#session").classList.add("on");
  $("#sess-end").style.display="none";
  $("#sess-body").style.display="block";
  $("#sess-top").style.display="flex";
  renderQ();
}
$("#sess-x").onclick=()=>{
  openModal(`<h3>세션을 그만할까요?</h3>
    <p class="m-desc">이번 세션의 진행 상황은 저장되지 않아요.</p>
    <button class="big-btn" id="qCont">계속하기</button>
    <button class="big-btn gray" style="margin-top:8px" id="qQuit">그만두기</button>`,false);

  $("#qQuit").onclick=()=>{_realCloseModal();exitSessionUI();};
};
function exitSessionUI(){if(sessPushed)history.back();else _realCloseSession()}
function _realCloseSession(){
  sessPushed=false;
  if(window.speechSynthesis)speechSynthesis.cancel();
  $("#session").classList.remove("on");SESS=null;
  show($$(".tab.on")[0]?.dataset.scr||"home");
}

    if(hasSTT){
      const mic=$("#btnMic");
      mic.onclick=()=>{
        if(mic.classList.contains("rec"))return;
        mic.classList.add("rec");$("#sttOut").innerHTML='<span style="color:var(--ink-soft)">듣고 있어요…</span>';
        listen(said=>{$("#sttOut").innerHTML=compareSpeech(q.card.en,said)+`<div style="font-size:13px;color:var(--ink-soft);margin-top:6px">내 발음: “${esc(said)}”</div>`;},
               ()=>mic.classList.remove("rec"));
      };
    }
    foot.innerHTML=`<button class="big-btn green" id="btnNext2">다 따라했어요 (+5)</button>`;
    $("#btnNext2").onclick=()=>{SESS.pts+=5;addPoints(5);markOk(q,true);advance();};
  }
}
function wireSpk(body,text,rate){
  body.querySelectorAll(".spk").forEach(b=>b.onclick=()=>speak(text,b.classList.contains("slow")?0.6:rate));
}
function wireChoices(q,isRight){
  const foot=$("#sess-foot");
  let sel=null;
  $$(".choice").forEach(b=>b.onclick=()=>{
    $$(".choice").forEach(x=>x.classList.remove("sel"));
    b.classList.add("sel");sel=b;
    foot.innerHTML=`<button class="big-btn green" id="btnCheck">확인</button>`;
    $("#btnCheck").onclick=()=>{
      const val=q.choices[+sel.dataset.i];
      const right=isRight(val);
      $$(".choice").forEach(x=>{
        const v=q.choices[+x.dataset.i];
        if(isRight(v))x.classList.add("right");
        else if(x===sel)x.classList.add("wrong");
        x.onclick=null;
      });
      daily().q++;
      if(right){
        daily().ok++;SESS.ok++;const p=SESS.ctx.bonus?15:10;SESS.pts+=p;addPoints(p);beep("ok");
        foot.className="fb-good";
        foot.innerHTML=`<div class="fb-line">정답이에요! +${p} ⭐</div><button class="big-btn green" id="btnNext">계속하기</button>`;
        if(q.type==="blank")speak(q.card.en);
      }else{
        beep("no");
        foot.className="fb-bad";
        foot.innerHTML=`<div class="fb-line">아쉬워요!</div>
          <div class="fb-detail">정답: <b>${esc(q.correct)}</b><br>${esc(q.card.en)} — ${esc(q.card.ko)}${q.card.gloss?`<br>💡 ${esc(q.card.pattern)} = ${esc(q.card.gloss)}`:""}</div>
          <button class="big-btn" id="btnNext">계속하기</button>`;
        if(!q.retried){const rq={...q,retried:true,choices:shuffle(q.choices)};SESS.qs.push(rq);SESS.total++;}
        speak(q.card.en);
      }
      markOk(q,right);
      $("#btnNext").onclick=advance;
    };
  });
}
function gradeSelf(q,g){
  daily().q++;
  if(SESS.ctx.kind==="review")srsGrade(q.card.id,g);
  if(g===2){daily().ok++;SESS.ok++;SESS.pts+=10;addPoints(10);beep("ok")}
  else if(g===1){daily().ok++;SESS.ok++;SESS.pts+=5;addPoints(5)}
  else{beep("no");if(!q.retried&&SESS.ctx.kind!=="review"){SESS.qs.push({...q,retried:true});SESS.total++;}}
  markOk(q,g>0);advance();
}
function markOk(q,ok){q._done=true}
function advance(){
  SESS.answered++;SESS.idx++;
  if(SESS.idx>=SESS.qs.length)endSession();
  else renderQ();
}
function endSession(){
  const c=SESS.ctx;
  /* 완료 처리 */
  if(c.kind==="stage"){
    const first=!isDone(c.si,c.ui,c.st);
    S.progress.done[stageKey(c.si,c.ui,c.st)]=true;
    if(first)stageCardPool(c.si,c.ui,c.st).forEach(cd=>srsEnroll(cd.id));
  }
  daily().sess++;
  const streakUp=bumpStreak();
  save();refreshTop();
  const acc=SESS.answered?Math.round(SESS.ok/SESS.answered*100):0;
  beep("win");
  $("#sess-body").style.display="none";
  $("#sess-top").style.display="none";
  const end=$("#sess-end");end.style.display="flex";
  end.innerHTML=`
    <div class="end-emoji">${acc>=80?"🎉":acc>=50?"💪":"🌱"}</div>
    <h2>${c.kind==="review"?"복습 완료!":"세션 완료!"}</h2>
    <div class="end-cards">
      <div class="end-card ec-pts"><div class="ec-v">+${SESS.pts}</div><div class="ec-l">포인트</div></div>
      <div class="end-card ec-acc"><div class="ec-v">${acc}%</div><div class="ec-l">정답률</div></div>
      <div class="end-card ec-str"><div class="ec-v">🔥${S.stats.streak}</div><div class="ec-l">${streakUp?"스트릭 UP!":"연속 학습"}</div></div>
    </div>
    <button class="big-btn" style="max-width:300px" id="btnEndOk">${c.kind==="review"?"홈으로":"맵으로 돌아가기"}</button>
    ${c.kind!=="review"&&dueCards().length?`<button class="sub-btn" style="margin-top:12px" id="btnGoReview">🔔 이어서 복습 ${dueCards().length}개 하기</button>`:""}`;
  $("#btnEndOk").onclick=exitSessionUI;
  const gr=$("#btnGoReview");if(gr)gr.onclick=()=>startReviewSession();
}
function startStage(si,ui,st){
  const qs=buildStageQs(si,ui,st);
  openSession(qs,{kind:"stage",si,ui,st,bonus:st===4});
}
function startCustomStage(idx){
  const cs=shuffle(S.custom.map(c=>({...c,custom:true})));
  const qs=[];
  if(idx===0)cs.slice(0,8).forEach((c,i)=>qs.push(makeQ(c,i%2?"shadow":"speak")));
  else cs.slice(0,10).forEach((c,i)=>qs.push(makeQ(c,["ctx","speak","blank","shadow"][i%4])));
  openSession(qs,{kind:"custom",bonus:idx===1});
}
function startReviewSession(){
  const due=shuffle(dueCards()).slice(0,20);
  if(!due.length){toast("오늘 복습할 카드가 없어요!");return}
  openSession(due.map(c=>makeQ(c,"speak")),{kind:"review"});
}

/* ================= 복습 화면 ================= */
function renderReview(){
  const due=dueCards();
  $("#dueN").textContent=due.length;
  const p=$("#reviewPanel");
  p.innerHTML=due.length
    ?`<p style="font-size:14px;font-weight:600;color:var(--ink-soft);line-height:1.6;margin-bottom:14px">한국어 뜻을 보고 영어로 말한 뒤 스스로 평가하면, 잊어버릴 때쯤 다시 나타나요.</p><button class="big-btn green" id="btnStartReview">복습 시작 (${Math.min(due.length,20)}개)</button>`
    :`<p style="font-size:14px;font-weight:600;color:var(--ink-soft);line-height:1.6">오늘 복습은 끝! 맵에서 새 스테이지를 진행하면 배운 문장이 자동으로 복습 목록에 들어와요. 🌱</p>`;
  const b=$("#btnStartReview");if(b)b.onclick=startReviewSession;
  drawChart($("#reviewChart"));
}
function drawChart(el){
  const d=dueInDays(),max=Math.max(...d,1);
  const names=["오늘","내일","+2","+3","+4","+5","+6"];
  el.innerHTML=d.map((v,i)=>`<div class="bar-col"><div class="bv">${v||""}</div><div class="b" style="height:${Math.max(v/max*100,3)}%"></div><div class="bn">${names[i]}</div></div>`).join("");
}

/* ================= 문장 관리 ================= */
function renderCards(filter){
  const list=$("#cardList");
  const f=(filter||$("#searchBox").value||"").toLowerCase().trim();
  let cards=allCards();
  if(f)cards=cards.filter(c=>(c.en+" "+c.ko+" "+(c.tags||[]).join(" ")+" "+(c.pattern||"")).toLowerCase().includes(f));
  const shown=cards.slice(0,120);
  list.innerHTML=shown.map(c=>{
    const r=srsOf(c.id);
    return `<div class="card-row">
      <div class="cr-en">${highlightHTML(c.en,c.highlight)} <button class="spk" data-say="${esc(c.en)}" style="font-size:16px">🔊</button></div>
      <div class="cr-ko">${esc(c.ko)}</div>
      <div class="cr-meta"><span class="badge">Lv.${c.level||1}</span>${(c.tags||[]).map(t=>`<span>#${esc(t)}</span>`).join("")}${r?`<span>📆 ${new Date(r.due).getMonth()+1}/${new Date(r.due).getDate()} 복습</span>`:"<span>미학습</span>"}</div>
      ${c.custom?`<div class="cr-btns"><button class="sub-btn" data-edit="${c.id}">수정</button><button class="sub-btn warn" data-del="${c.id}">삭제</button></div>`:""}
    </div>`;
  }).join("")+(cards.length>120?`<p class="hint" style="padding:10px">외 ${cards.length-120}개 — 검색으로 좁혀보세요</p>`:"")
    +(!cards.length?'<p class="hint" style="padding:20px">검색 결과가 없어요</p>':"");
  list.querySelectorAll("[data-say]").forEach(b=>b.onclick=()=>speak(b.dataset.say));
  list.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    askConfirm("문장 삭제","이 문장과 복습 기록을 삭제할까요?","삭제",()=>{
      S.custom=S.custom.filter(c=>c.id!==b.dataset.del);delete S.srs[b.dataset.del];save();renderCards();toast("삭제했어요");
    },true);
  });
  list.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>cardForm(S.custom.find(c=>c.id===b.dataset.edit)));
}
$("#searchBox").oninput=()=>renderCards();
$("#btnAddCard").onclick=()=>cardForm(null);
$("#btnBulkAdd").onclick=bulkForm;

function cardForm(card){
  openModal(`
    <h3>${card?"문장 수정":"새 문장 추가"}</h3>
    <div class="field"><label>영어 문장 *</label><input id="fEn" value="${card?esc(card.en):""}" placeholder="I'm looking forward to the weekend."></div>
    <div class="field"><label>한국어 뜻 *</label><input id="fKo" value="${card?esc(card.ko):""}" placeholder="주말이 기대돼."></div>
    <div class="field"><label>강조할 표현 (문장 속 일부)</label><input id="fHl" value="${card?esc(card.highlight||""):""}" placeholder="looking forward to"></div>
    <div class="field"><label>핵심 패턴 (메모)</label><input id="fPt" value="${card?esc(card.pattern||""):""}" placeholder="look forward to ~"></div>
    <div class="field"><label>레벨</label><select id="fLv">${[1,2,3,4,5].map(l=>`<option ${card&&card.level===l?"selected":""}>${l}</option>`).join("")}</select></div>
    <div class="field"><label>태그 (쉼표로 구분)</label><input id="fTg" value="${card?esc((card.tags||[]).join(", ")):""}" placeholder="일상, 주말"></div>
    <button class="big-btn green" id="fSave">저장</button>
    <button class="big-btn gray" style="margin-top:8px" id="fCancel">취소</button>`);
  $("#fCancel").onclick=closeModal;
  $("#fSave").onclick=()=>{
    const en=$("#fEn").value.trim(),ko=$("#fKo").value.trim();
    if(!en||!ko){toast("영어 문장과 뜻은 필수예요");return}
    let hl=$("#fHl").value.trim();
    if(hl&&!en.toLowerCase().includes(hl.toLowerCase()))hl="";
    const data={en,ko,highlight:hl,pattern:$("#fPt").value.trim(),level:+$("#fLv").value,
      tags:$("#fTg").value.split(",").map(s=>s.trim()).filter(Boolean)};
    if(card)Object.assign(S.custom.find(c=>c.id===card.id),data);
    else{const id="u"+Date.now()+Math.floor(Math.random()*999);S.custom.push({id,...data});srsEnroll(id);}
    save();closeModal();renderCards();toast(card?"수정했어요":"추가했어요! 내 문장 유닛에서 훈련할 수 있어요");
  };
}
function bulkForm(){
  openModal(`
    <h3>여러 문장 한 번에 추가</h3>
    <p style="font-size:13px;color:var(--ink-soft);font-weight:600;line-height:1.6;margin-bottom:10px">
      한 줄에 하나씩, <b>영어 | 한국어 뜻</b> 형식으로 붙여넣으세요.<br>선택: 세 번째 칸에 강조 표현 (영어 | 뜻 | 강조)</p>
    <div class="field"><textarea id="fBulk" placeholder="I'm on my way. | 지금 가는 중이야. | on my way&#10;It's up to you. | 네가 결정해."></textarea></div>
    <div class="field"><label>레벨</label><select id="fBLv">${[1,2,3,4,5].map(l=>`<option>${l}</option>`).join("")}</select></div>
    <button class="big-btn green" id="fBSave">추가</button>
    <button class="big-btn gray" style="margin-top:8px" id="fBCancel">취소</button>`);
  $("#fBCancel").onclick=closeModal;
  $("#fBSave").onclick=()=>{
    const lines=$("#fBulk").value.split("\n").map(l=>l.trim()).filter(Boolean);
    let n=0;
    lines.forEach(l=>{
      const p=l.split("|").map(s=>s.trim());
      if(p.length<2||!p[0]||!p[1])return;
      let hl=p[2]||"";
      if(hl&&!p[0].toLowerCase().includes(hl.toLowerCase()))hl="";
      const id="u"+Date.now()+Math.floor(Math.random()*99999)+n;
      S.custom.push({id,en:p[0],ko:p[1],highlight:hl,pattern:"",level:+$("#fBLv").value,tags:["내 문장"]});
      srsEnroll(id);n++;
    });
    save();closeModal();renderCards();toast(n?`${n}개 문장을 추가했어요`:"형식을 확인해주세요 (영어 | 뜻)");
  };
}
let modalPushed=false;
function openModal(html,push=true){
  $("#modalBox").innerHTML=html;$("#modal").classList.add("on");
  modalPushed=false;
  if(push){try{history.pushState({v:"modal"},"");modalPushed=true}catch(e){}}
}
function closeModal(){if(modalPushed)history.back();else _realCloseModal()}
function _realCloseModal(){$("#modal").classList.remove("on");modalPushed=false}
$("#modal").onclick=e=>{if(e.target.id==="modal")closeModal()};
function askConfirm(title,desc,yesLabel,onYes,danger){
  openModal(`<h3>${title}</h3><p class="m-desc">${desc}</p>
    <button class="big-btn ${danger?"":"green"}" id="cfYes" ${danger?'style="background:var(--red);box-shadow:0 4px 0 #c22b3e"':""}>${esc(yesLabel)}</button>
    <button class="big-btn gray" style="margin-top:8px" id="cfNo">취소</button>`,false);
  $("#cfNo").onclick=closeModal;
  $("#cfYes").onclick=()=>{_realCloseModal();onYes()};
}

/* ================= 통계 ================= */
const ROADMAP=[
  ["1~3개월","생존 표현 몸에 붙이기","인사·주문·부탁 문장을 반사적으로. 섹션 1~2 완주",0],
  ["4~9개월","핵심 패턴 자동화","자주 쓰는 패턴 100개가 입에서 바로. 섹션 3~4 완주 + 매일 복습",0.125],
  ["10~18개월","내 이야기 말하기","내 일상·취미·생각을 문장으로. 섹션 5~6 + 내 문장 늘리기",0.375],
  ["19~24개월","자유 대화 연습","배운 패턴을 조합해 실제 대화. 전화영어·언어교환 병행 추천",0.75]
];
function renderStats(){
  const cards=allCards(),learned=Object.keys(S.srs).length;
  const dl=Object.values(S.stats.daily);
  const q=dl.reduce((a,b)=>a+b.q,0),ok=dl.reduce((a,b)=>a+b.ok,0);
  $("#statGrid").innerHTML=[
    [cards.length,"총 문장"],[learned,"학습한 문장"],
    [q?Math.round(ok/q*100)+"%":"—","누적 정답률"],[S.stats.points,"총 포인트"]
  ].map(x=>`<div class="stat-cell"><div class="sc-v">${x[0]}</div><div class="sc-l">${x[1]}</div></div>`).join("");
  drawChart($("#statChart"));
  $("#secProgress").innerHTML=CONTENT.map((sec,si)=>{
    const total=sec.units.length*5;
    let done=0;sec.units.forEach((u,ui)=>{for(let st=0;st<5;st++)if(isDone(si,ui,st))done++});
    const pct=Math.round(done/total*100);
    return `<div class="prog-line"><div class="pl-t"><span>섹션 ${si+1} · ${esc(sec.t)}</span><span>${pct}%</span></div>
      <div class="pl-bar"><div class="pl-fill" style="width:${pct}%;background:${SEC_COLORS[si%SEC_COLORS.length]}"></div></div></div>`;
  }).join("");
  /* 로드맵: 전체 스테이지 진행률로 현재 단계 추정 */
  const totalSt=CONTENT.reduce((a,s)=>a+s.units.length*5,0);
  const doneSt=Object.keys(S.progress.done).length;
  const ratio=doneSt/totalSt;
  let nowIdx=0;ROADMAP.forEach((r,i)=>{if(ratio>=r[3])nowIdx=i});
  $("#roadmap").innerHTML=ROADMAP.map((r,i)=>`
    <div class="road-item ${i<nowIdx?"past":i===nowIdx?"now":""}">
      <div class="ri-col"><div class="ri-dot"></div>${i<ROADMAP.length-1?'<div class="ri-line"></div>':""}</div>
      <div class="ri-body"><div class="ri-t">${r[0]} — ${r[1]} ${i===nowIdx?"◀ 지금 여기":""}</div><div class="ri-d">${r[2]}</div></div>
    </div>`).join("");
}

/* ================= 설정 ================= */
function renderSettings(){
  $("#setRate").value=String(S.settings.ttsRate);
  $("#setSound").value=String(S.settings.sound);
  $("#setGoal").value=String(S.settings.dailyGoal);
}
$("#setRate").onchange=e=>{S.settings.ttsRate=+e.target.value;save();speak("Hello! Nice to meet you.")};
$("#setSound").onchange=e=>{S.settings.sound=+e.target.value;save();beep("ok")};
$("#setGoal").onchange=e=>{S.settings.dailyGoal=+e.target.value;save()};
$("#btnExport").onclick=()=>{
  const blob=new Blob([JSON.stringify({app:"freetalk",exported:new Date().toISOString(),state:S},null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`freetalk-backup-${todayKey()}.json`;
  a.click();URL.revokeObjectURL(a.href);
  toast("백업 파일을 내려받았어요");
};
$("#btnImport").onclick=()=>$("#importFile").click();
$("#importFile").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      const st=d.state||d;
      if(!st.srs||!st.stats)throw 0;
      askConfirm("백업 가져오기","현재 기기의 데이터를 백업 파일 내용으로 덮어써요. 계속할까요?","가져오기",()=>{
        S=Object.assign(defaultState(),st);migrate();save();
        refreshTop();show("home");toast("가져오기 완료!");
      });
    }catch(err){toast("올바른 백업 파일이 아니에요")}
    e.target.value="";
  };
  r.readAsText(f);
};
$("#btnReset").onclick=()=>{
  askConfirm("모든 데이터 삭제","진도·통계·내 문장이 모두 사라지고 되돌릴 수 없어요. 정말 삭제할까요?","전부 삭제",()=>{
    S=defaultState();save();refreshTop();show("home");toast("초기화했어요");
  },true);
};

/* ================= 시작 ================= */
load();refreshTop();renderHome();
</script>
